name: Claude PR Review Response

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-response:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Check out PR head commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Claude on the review feedback
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A PR review or inline comment was submitted on this pull request.

            Your job:
            1. Read the review body (top-level review comment) and every inline comment on the PR diff.
            2. For each comment, determine whether it is actionable (requests a change) or informational (praise, a question you can answer in-thread).
            3. For actionable comments: make the change in the relevant file(s). Preserve the overall structure of the document/code — edit in place, don't rewrite whole sections unless the feedback demands it.
            4. For informational comments: leave them; don't fabricate work.
            5. If code changed, run `pytest -v --tb=short && ruff check .` locally before committing. TDD non-negotiable — don't commit if tests fail.
            6. Commit your changes to the PR branch with a descriptive message that summarizes which comments you addressed.
            7. Push the commit.
            8. Reply to the PR with a top-level comment summarizing: (a) which inline comments you addressed and how, (b) which you left unaddressed and why.

            Context for this repo (entraclaw-identity-research / EntraClaw):
            - Private single-author research project
            - EntraClaw is the "body" — agent identity, Teams MCP, email, blob memory sync
            - Relates to persona-sati (the "mind") via cross-blueprint consent grants
            - TDD non-negotiable: pytest -v && ruff check . must pass before every commit if code changed
            - Never push to main — always PR branch
            - Flag naming is being aligned with persona-sati: --with-upn-prefix and --with-blueprint (replacing the old --with-upn-suffix and --use-blueprint)
          claude_args: "--max-turns 15 --model claude-opus-4-7"
