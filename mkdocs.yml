site_name: "Openclaw Identity Research"
site_description: "Securing agentic workflows on devices with Agent IDs and OBO flows"
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: getting-started/quickstart.md
  - Architecture:
    - System Overview: architecture/system-overview.md
    - Enforcement Flow: architecture/enforcement-flow.md
    - Layers:
      - Platform Abstraction: architecture/layers/platform.md
      - Auth & Token Flows: architecture/layers/auth.md
      - Audit: architecture/layers/audit.md
      - Teams Integration: architecture/layers/teams.md
  - Reference:
    - OBO Token Flows: reference/obo-flows.md
  - Developer Guide:
    - QA Log: developer/qa-log.md
    - Docs Site: developer/docs-site.md
  - Runbooks:
    - Hard-Won Learnings: runbooks/hard-won-learnings.md
  - Platform Learnings:
    - GitHub CLI: platform-learnings/github-cli.md
    - Teams Graph API: platform-learnings/teams-graph-api.md
    - Teams Bot Framework: platform-learnings/teams-bot-framework.md
    - Teams Toolkit: platform-learnings/teams-toolkit.md
    - MSAL & Entra Agent IDs: platform-learnings/msal-entra-agent-ids.md
    - macOS Platform: platform-learnings/platform-macos.md
    - Linux Platform: platform-learnings/platform-linux.md
    - Windows Platform: platform-learnings/platform-windows.md
    - Copilot Extensibility: platform-learnings/copilot-extensibility.md
    - GitHub Copilot Extensions: platform-learnings/github-copilot-extensions.md
  - Decision Records:
    - Index: decisions/README.md
